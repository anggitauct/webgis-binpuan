<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 

        /* MATIIN HIGHLIGHT BIRU PAS KLIK TITIK */
        .ol-selectable.ol-selected, .ol-feature-select {
            outline: none !important;
            background: transparent !important;
        }
        
        /* KURSOR: DEFAULT, JARI NUNJUK PAS HOVER TITIK AJA */
        #map .ol-viewport {
            cursor: default !important;
            touch-action: pan-x pan-y !important;
        }
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Sebaran Kegiatan Direktorat Pembinaan Kemampuan</title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <!-- FILTER DATA POJOK KIRI BAWAH -->
        <div id="filter-panel" style="position: absolute; bottom: 10px; left: 10px; z-index: 1000; background: rgba(248,248,248,0.98); border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: Arial, sans-serif; font-size: 13px; min-width: 180px; border: 1px solid #ddd;">
            <div id="filter-header" style="font-weight: bold; padding: 10px 15px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #ddd; user-select: none; background-color: #f8f8f8;">
                Filter Data <span id="filter-toggle" style="float: right;">▼</span>
            </div>
            <div id="filter-body" style="padding: 15px; display: block; background-color: #f8f8f8;">
                <label>Tahun:</label><br>
                <select id="filter-tahun" style="width: 160px; padding: 4px; margin-bottom: 8px; background-color: #fff;">
                    <option value="">Semua Tahun</option>
                </select><br>
                
                <label>Unit:</label><br>
                <select id="filter-unit" style="width: 160px; padding: 4px; margin-bottom: 8px; background-color: #fff;">
                    <option value="">Semua Unit</option>
                </select><br>
                
                <label>Provinsi:</label><br>
                <select id="filter-provinsi" style="width: 160px; padding: 4px; margin-bottom: 8px; background-color: #fff;">
                    <option value="">Semua Provinsi</option>
                </select><br>
                
                <button id="btn-reset" style="width: 100%; padding: 5px; margin-top: 5px; background: #d9534f; color: white; border: none; border-radius: 2px; cursor: pointer;">Reset Filter</button>
                <div id="jumlah-data" style="margin-top: 8px; font-size: 11px; color: #555;"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/ProvinsiyangPernahDikunjungi_6.js"></script><script src="layers/DirektoratPembinaankemampuan_7.js"></script><script src="layers/Overview_8.js"></script>
        <script src="styles/ProvinsiyangPernahDikunjungi_6_style.js"></script><script src="styles/DirektoratPembinaankemampuan_7_style.js"></script><script src="styles/Overview_8_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>

        <script>
        var namaLayerQGIS = lyr_DirektoratPembinaankemampuan_7;
        var fieldTahun = 'Tahun';
        var fieldUnit = 'Unit';
        var fieldProvinsi = 'Provinsi';

        window.addEventListener('load', function() {
            // KURSOR JARI NUNJUK PAS HOVER TITIK AJA
            setTimeout(function() {
                var hoveredFeature = null;
                map.on('pointermove', function(e) {
                    if (e.dragging) return;
                    var pixel = map.getEventPixel(e.originalEvent);
                    var feature = map.forEachFeatureAtPixel(pixel, function(feature) {
                        return feature;
                    });
                    
                    if (feature !== hoveredFeature) {
                        hoveredFeature = feature;
                        map.getTargetElement().style.cursor = feature ? 'pointer' : 'default';
                    }
                });
            }, 1000);

            setTimeout(function() {
                if (typeof namaLayerQGIS === 'undefined') {
                    console.error('Layer tidak ditemukan');
                    alert('ERROR: Nama layer salah. Cek layers/layers.js');
                    return;
                }

                var sourceAsli = namaLayerQGIS.getSource();
                var semuaFitur = sourceAsli.getFeatures();

                if (semuaFitur.length === 0) {
                    console.log('Data belum ke-load, coba refresh');
                    return;
                }

                function isiDropdownFilter() {
                    let dataTahun = new Set(), dataUnit = new Set(), dataProv = new Set();
                    
                    semuaFitur.forEach(function(fitur) {
                        if (fitur.get(fieldTahun)) dataTahun.add(fitur.get(fieldTahun));
                        if (fitur.get(fieldUnit)) dataUnit.add(fitur.get(fieldUnit));
                        if (fitur.get(fieldProvinsi)) dataProv.add(fitur.get(fieldProvinsi));
                    });
                    
                    let elTahun = document.getElementById('filter-tahun');
                    let elUnit = document.getElementById('filter-unit');
                    let elProv = document.getElementById('filter-provinsi');
                    
                    [...dataTahun].sort().forEach(val => elTahun.innerHTML += `<option value="${val}">${val}</option>`);
                    [...dataUnit].sort().forEach(val => elUnit.innerHTML += `<option value="${val}">${val}</option>`);
                    [...dataProv].sort().forEach(val => elProv.innerHTML += `<option value="${val}">${val}</option>`);
                    
                    updateJumlahData();
                    console.log('Filter siap! Total data:', semuaFitur.length);
                }

                function jalankanFilter() {
                    let pilihTahun = document.getElementById('filter-tahun').value;
                    let pilihUnit = document.getElementById('filter-unit').value;
                    let pilihProv = document.getElementById('filter-provinsi').value;
                    
                    sourceAsli.clear();
                    
                    let jumlahMuncul = 0;
                    semuaFitur.forEach(function(fitur) {
                        let lolosTahun = pilihTahun === "" || fitur.get(fieldTahun) == pilihTahun;
                        let lolosUnit = pilihUnit === "" || fitur.get(fieldUnit) == pilihUnit;
                        let lolosProv = pilihProv === "" || fitur.get(fieldProvinsi) == pilihProv;
                        
                        if (lolosTahun && lolosUnit && lolosProv) {
                            sourceAsli.addFeature(fitur);
                            jumlahMuncul++;
                        }
                    });
                    
                    document.getElementById('jumlah-data').innerHTML = `Menampilkan: ${jumlahMuncul} dari ${semuaFitur.length} data`;
                }

                function updateJumlahData() {
                    document.getElementById('jumlah-data').innerHTML = `Menampilkan: ${semuaFitur.length} data`;
                }

                document.getElementById('filter-tahun').addEventListener('change', jalankanFilter);
                document.getElementById('filter-unit').addEventListener('change', jalankanFilter);
                document.getElementById('filter-provinsi').addEventListener('change', jalankanFilter);

                document.getElementById('btn-reset').addEventListener('click', function() {
                    document.getElementById('filter-tahun').value = "";
                    document.getElementById('filter-unit').value = "";
                    document.getElementById('filter-provinsi').value = "";
                    sourceAsli.clear();
                    sourceAsli.addFeatures(semuaFitur);
                    updateJumlahData();
                });

                document.getElementById('filter-header').addEventListener('click', function() {
                    var body = document.getElementById('filter-body');
                    var toggle = document.getElementById('filter-toggle');
                    if (body.style.display === 'none') {
                        body.style.display = 'block';
                        toggle.innerHTML = '▼';
                    } else {
                        body.style.display = 'none';
                        toggle.innerHTML = '▲';
                    }
                });

                isiDropdownFilter();
            }, 1500);
        });
        </script>        
    </body>
</html>
